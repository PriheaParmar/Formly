<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formly Vault</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="options.css" />
  </head>

  <body>
    <div class="app-layout">
      <header class="app-header">
        <div class="brand-group">
          <img src="icon128.png" alt="Formly Logo" class="logo" />
          <div class="brand-text">
            <h1>Formly</h1>
            <span class="badge">
              <svg viewBox="0 0 24 24" class="badge-icon" aria-hidden="true">
                <rect x="5" y="11" width="14" height="10" rx="2" ry="2" />
                <path d="M8 11V7a4 4 0 018 0v4" />
              </svg>
              Secure Vault
            </span>
          </div>
        </div>

        <div class="header-actions">
          <button id="pinButton" class="btn btn-ghost icon-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M7 11V8.5C7 5.5 9 3.5 12 3.5S17 5.5 17 8.5V11" /><path d="M6.5 11H17.5C18.6 11 19.5 11.9 19.5 13V18.5C19.5 19.6 18.6 20.5 17.5 20.5H6.5C5.4 20.5 4.5 19.6 4.5 18.5V13C4.5 11.9 5.4 11 6.5 11Z" /><path d="M12 15V17" /></svg>
            <span>Change PIN</span>
          </button>
          <button id="expandBtn" class="btn btn-ghost icon-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M8 3H5C3.9 3 3 3.9 3 5V8" /><path d="M16 3H19C20.1 3 21 3.9 21 5V8" /><path d="M8 21H5C3.9 21 3 20.1 3 19V16" /><path d="M16 21H19C20.1 21 21 20.1 21 19V16" /><path d="M9 9L3.8 3.8" /><path d="M15 9L20.2 3.8" /><path d="M9 15L3.8 20.2" /><path d="M15 15L20.2 20.2" /></svg>
            <span>Expand all</span>
          </button>
          <button id="refreshBtn" class="btn btn-ghost icon-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M20 6V11H15" /><path d="M4 18V13H9" /><path d="M18.1 9C17.3 6.7 15 5 12.3 5C9.4 5 7 6.9 6.2 9.5" /><path d="M5.9 15C6.7 17.3 9 19 11.7 19C14.6 19 17 17.1 17.8 14.5" /></svg>
            <span>Refresh</span>
          </button>
          <button id="deleteAll" class="btn btn-danger icon-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M4 7H20" /><path d="M10 11V17" /><path d="M14 11V17" /><path d="M6 7L7 20H17L18 7" /><path d="M9 7V4H15V7" /></svg>
            <span>Delete all</span>
          </button>
        </div>
      </header>

      <main class="page-content">
        <section class="toolbar">
          <div class="stats-group">
            <div class="stat-box">
              <span class="stat-label">Sites</span>
              <strong id="siteCount" class="stat-value">0</strong>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
              <span class="stat-label">Saved answers</span>
              <strong id="answerCount" class="stat-value">0</strong>
            </div>
          </div>

          <div class="search-wrap">
            <svg class="search-svg" viewBox="0 0 24 24"><path d="M10.8 18.1C14.8317 18.1 18.1 14.8317 18.1 10.8C18.1 6.76832 14.8317 3.5 10.8 3.5C6.76832 3.5 3.5 6.76832 3.5 10.8C3.5 14.8317 6.76832 18.1 10.8 18.1Z" /><path d="M16.2 16.2L20.5 20.5" /></svg>
            <input id="searchInput" type="text" placeholder="Search site or question..." />
            <button id="clearSearch" class="btn btn-ghost icon-btn tiny-btn hidden" type="button">
              <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
              <span>Clear</span>
            </button>
          </div>
        </section>

        <section id="list" class="accordion-list"></section>
      </main>
    </div>

    <div id="pinModal" class="modal-backdrop hidden" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">Reveal answer</h2>
          <p id="modalSub">Enter your Formly PIN to continue.</p>
        </div>

        <div class="modal-body">
          <input id="pinInput" type="password" autocomplete="off" placeholder="Enter PIN" />
          <input id="pinConfirmInput" class="hidden" type="password" autocomplete="off" placeholder="Confirm PIN" />
          <div id="modalError" class="modal-error"></div>
        </div>

        <div class="modal-footer">
          <button id="pinCancel" class="btn btn-ghost icon-btn" type="button">
            <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            <span>Cancel</span>
          </button>
          <button id="pinSubmit" class="btn btn-primary icon-btn" type="button">
            <span>Continue</span>
            <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7"/></svg>
          </button>
        </div>
      </div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
