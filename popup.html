<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formly</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="topbar">
        <div class="brand">
          <img src="icon48.png" alt="Formly" class="brand-logo" />
          <div class="brand-text">Formly</div>
        </div>
        <button id="openOptions" type="button" class="btn btn-ghost" title="Manage saved answers">
          <span>Manage</span>
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </button>
      </header>

      <section class="site-card">
        <div class="site-host" id="site">Current Site</div>
        <div class="site-count"><strong id="count">0</strong> saved</div>
      </section>

      <section class="panel">
        <label class="row" for="enabled">
          <div class="row-text">
            <span class="row-title">Autofill Enabled</span>
          </div>
          <div class="switch">
            <input id="enabled" type="checkbox" />
            <span class="slider"></span>
          </div>
        </label>

        <label class="row" for="askBeforeAutofill">
          <div class="row-text">
            <span class="row-title">Ask before fill</span>
          </div>
          <div class="switch">
            <input id="askBeforeAutofill" type="checkbox" />
            <span class="slider"></span>
          </div>
        </label>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
